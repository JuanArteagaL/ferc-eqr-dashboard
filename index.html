{

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f4f8;color:#1a202c}

</head>
<body>
<div class="header">
  <h1>FERC EQR Analyzer</h1>
  <p>Reads PUDL FERC EQR Parquet data from S3 &mdash; no file downloads needed. Powered by DuckDB-WASM.</p>
</div>
<div class="container">
  <div class="card">
    <div class="grid">
      <div><label>Start Year</label><select id="sy"></select></div>
      <div><label>Start Quarter</label>
        <select id="sq">
          <option value="1">Q1</option><option value="2">Q2</option>
          <option value="3">Q3</option><option value="4">Q4</option>
        </select>
      </div>
      <div><label>End Year</label><select id="ey"></select></div>
      <div><label>End Quarter</label>
        <select id="eq">
          <option value="1">Q1</option><option value="2">Q2</option>
          <option value="3">Q3</option><option value="4" selected>Q4</option>
        </select>
      </div>
      <div><label>ISO / BA</label><select id="iso"></select></div>
      <div><label>Metric</label>
        <select id="metric">
          <option value="wind_ppa">Wind PPA</option>
          <option value="solar_ppa">Solar PPA</option>
          <option value="capacity_prices">Capacity Prices</option>
          <option value="ancillary_service_payments">Ancillary Services</option>
          <option value="energy_payments">Energy Payments</option>
        </select>
      </div>
      <div><label>Time Grain</label>
        <div class="radio-group">
          <label><input type="radio" name="grain" value="quarter" checked> Quarter</label>
          <label><input type="radio" name="grain" value="year"> Year</label>
        </div>
      </div>
      <div><label>Statistic</label>
        <select id="stat">
          <option value="average">Average</option>
          <option value="median" selected>Median</option>
          <option value="total_payments">Total Payments</option>
        </select>
      </div>
    </div>
    <button class="btn btn-primary" id="run-btn" onclick="runQuery()" disabled>Initializing…</button>
    <div class="status loading" id="status">Loading DuckDB-WASM (first load ~10s)…</div>
  </div>

    <div class="section-head">
      <span class="section-title" id="chart-title">Chart</span>
    </div>
    <div id="chart-box"></div>

// ── state ──────────────────────────────────────────────
let conn = null;
let aggData = null, detData = null;

// ── UI init ────────────────────────────────────────────
(function initUI() {
  const sy = document.getElementById('sy'), ey = document.getElementById('ey');
  for (let y = 2013; y <= 2026; y++) {
    sy.add(new Option(y, y, y===2020, y===2020));

// ── helpers ────────────────────────────────────────────
function setStatus(msg, cls='') {
  const el = document.getElementById('status');
  el.textContent = msg; el.className = 'status ' + cls;
}

function quarterList(sy, sq, ey, eq) {
  const out = []; let y=sy, q=sq;
  while (y < ey || (y===ey && q<=eq)) {
    out.push(`${y}q${q}`); q++;
    if (q===5) { y++; q=1; }
  }
  return out;
}

function sqlArr(urls) {
  return '[' + urls.map(u => `'${u}'`).join(',') + ']';
}

function arrowToRows(table) {
  const fields = table.schema.fields.map(f => f.name);
  const rows = [];
  for (const batch of table.batches) {
    const cols = fields.map((_, i) => batch.getChildAt(i));
    for (let r = 0; r < batch.numRows; r++) {
      const row = {};
      fields.forEach((name, i) => {
        let v = cols[i].get(r);
        if (typeof v === 'bigint') v = Number(v);
        row[name] = v;
      });
      rows.push(row);
    }
  }
  return rows;
}

function fmtVal(v) {
  if (v === null || v === undefined) return '';
  if (v instanceof Date) return v.toISOString().slice(0, 10);
  if (typeof v === 'number') return Number.isInteger(v) ? v.toLocaleString() : v.toFixed(4);
  return String(v);
}

function renderTable(id, rows) {
  const el = document.getElementById(id);
  if (!rows || !rows.length) { el.innerHTML = '<p style="color:#718096;padding:8px">No data</p>'; return; }
  const cols = Object.keys(rows[0]);
  const display = rows.slice(0, 1000);
  let h = '<table><thead><tr>' + cols.map(c => `<th>${c}</th>`).join('') + '</tr></thead><tbody>';
  display.forEach(row => {
    h += '<tr>' + cols.map(c => `<td>${fmtVal(row[c])}</td>`).join('') + '</tr>';
  });
  h += '</tbody></table>';
  el.innerHTML = h;
}

window.dlCsv = function(type) {
  const data = type === 'agg' ? aggData : detData;
  if (!data || !data.length) return;
  const cols = Object.keys(data[0]);
  const esc = v => {
    const s = v instanceof Date ? v.toISOString() : (v === null || v === undefined ? '' : String(v));
    return (s.includes(',') || s.includes('"') || s.includes('\n')) ? `"${s.replace(/"/g, '""')}"` : s;
  };
  const csv = [cols.join(','), ...data.map(r => cols.map(c => esc(r[c])).join(','))].join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], {type: 'text/csv'}));
  a.download = `ferc_eqr_${type}_${Date.now()}.csv`;
  a.click();
};

// ── query builder ──────────────────────────────────────
function buildQueries(metric, iso, grain, sy, sq, ey, eq) {
  const qs = quarterList(sy, sq, ey, eq);
  const pExpr = grain === 'quarter'
    ? "strftime(date_trunc('quarter', obs_date), '%Y-%m-%d')"
    : "strftime(date_trunc('year',    obs_date), '%Y-%m-%d')";
  const isoF = iso === 'ALL' ? '' : `AND iso = '${iso}'`;

  if (metric === 'wind_ppa' || metric === 'solar_ppa') {
    const tech = metric === 'wind_ppa' ? 'wind' : 'solar';
    const urls = sqlArr(qs.map(q => `${BASE}/core_ferceqr__contracts/${q}.parquet`));
    const base = `
WITH src AS (
  SELECT
    TRY_CAST(quantity AS DOUBLE) AS quantity,
    units, rate_units, class_name, term_name, product_name,
    ferc_tariff_reference, rate_description,
    point_of_receipt_balancing_authority,
    point_of_delivery_balancing_authority,
    seller_company_name, customer_company_name,
    COALESCE(begin_date, commencement_date_of_contract_term, contract_execution_date) AS obs_date,
    CONCAT_WS(' | ', seller_company_name, customer_company_name, ferc_tariff_reference,
      rate_description, product_name, point_of_receipt_balancing_authority,
      point_of_delivery_balancing_authority) AS text_blob,
    COALESCE(TRY_CAST(rate AS DOUBLE), TRY_CAST(rate_minimum AS DOUBLE),
      TRY_CAST(rate_maximum AS DOUBLE)) AS price_raw,
    COALESCE(point_of_delivery_balancing_authority,
      point_of_receipt_balancing_authority) AS ba
  FROM read_parquet(${urls}, union_by_name=true)
), screened AS (
  SELECT
    ${pExpr} AS period,
    CAST(obs_date AS VARCHAR) AS obs_date,
    seller_company_name, customer_company_name,
    quantity, units, price_raw AS metric_value, rate_units,
    class_name, term_name, product_name, rate_description,
    point_of_receipt_balancing_authority,
    point_of_delivery_balancing_authority,
    ${ISO_CASE} AS iso,
    text_blob
  FROM src
  WHERE obs_date IS NOT NULL
    AND price_raw IS NOT NULL AND price_raw > 0 AND price_raw < 250
    AND lower(COALESCE(rate_units,'')) LIKE '%mwh%'
    AND regexp_matches(lower(COALESCE(text_blob,'')), '${tech}')
    AND NOT regexp_matches(lower(COALESCE(text_blob,'')),
      'rec only|renewable energy credit only|test energy|hourly|real[- ]?time|day[- ]ahead|market[- ]?based|merchant|index|formula')
    AND lower(COALESCE(term_name,'')) IN ('lt','long')
)`;
    return {
      title: `${tech.charAt(0).toUpperCase() + tech.slice(1)} PPA price ($/MWh)`,
      agg: base + `
SELECT period, iso,
  COUNT(*) AS observations,
  AVG(metric_value) AS avg_value,
  MEDIAN(metric_value) AS median_value,
  MIN(metric_value) AS min_value,
  MAX(metric_value) AS max_value,
  SUM(COALESCE(quantity,0)) AS total_quantity
FROM screened WHERE 1=1 ${isoF}
GROUP BY 1,2 ORDER BY period, iso;`,
      det: base + `
SELECT period, obs_date, iso AS zone,
  seller_company_name AS seller, customer_company_name AS buyer,
  quantity, units, metric_value AS price, rate_units,
  class_name, term_name, product_name,
  point_of_receipt_balancing_authority AS por_ba,
  point_of_delivery_balancing_authority AS pod_ba,
  rate_description
FROM screened WHERE 1=1 ${isoF}
ORDER BY obs_date DESC, seller, buyer LIMIT 10000;`
    };
  }

  // transactions-based metrics
  const urls = sqlArr(qs.map(q => `${BASE}/core_ferceqr__transactions/${q}.parquet`));
  let productFilter, extraCol = '';
  const titles = {
    capacity_prices: 'Capacity prices',
    ancillary_service_payments: 'Ancillary service payments',
    energy_payments: 'Energy payments'
  };

  if (metric === 'capacity_prices') {
    productFilter = "AND upper(COALESCE(product_name,'')) = 'CAPACITY' AND standardized_price > 0 AND standardized_price < 500";
  } else if (metric === 'ancillary_service_payments') {
    productFilter = `AND upper(COALESCE(product_name,'')) IN (
      'SPINNING RESERVE','SUPPLEMENTAL RESERVE','REGULATION & FREQUENCY RESPONSE',
      'REACTIVE SUPPLY & VOLTAGE CONTROL','BLACK START SERVICE')`;
    extraCol = ', product_name';
  } else {
    productFilter = "AND upper(COALESCE(product_name,'')) = 'ENERGY'";
  }

  const base = `
WITH src AS (
  SELECT
    COALESCE(transaction_begin_date, trade_date) AS obs_date,
    seller_company_name, customer_company_name,
    TRY_CAST(standardized_price AS DOUBLE) AS standardized_price,
    TRY_CAST(total_transaction_charge AS DOUBLE) AS total_transaction_charge,
    TRY_CAST(standardized_quantity AS DOUBLE) AS standardized_quantity,
    rate_units, point_of_delivery_balancing_authority AS ba,
    product_name, ferc_tariff_reference, class_name, term_name
  FROM read_parquet(${urls}, union_by_name=true)
), screened AS (
  SELECT
    ${pExpr} AS period,
    CAST(obs_date AS VARCHAR) AS obs_date,
    seller_company_name, customer_company_name,
    ${ISO_CASE} AS iso,
    upper(COALESCE(product_name,'')) AS product_name,
    standardized_price AS metric_value,
    total_transaction_charge, standardized_quantity,
    rate_units, ferc_tariff_reference, class_name, term_name
  FROM src
  WHERE obs_date IS NOT NULL AND standardized_price IS NOT NULL ${productFilter}
)`;

  return {
    title: titles[metric],
    agg: base + `
SELECT period, iso,
  COUNT(*) AS observations,
  AVG(metric_value) AS avg_value,
  MEDIAN(metric_value) AS median_value,
  SUM(COALESCE(total_transaction_charge,0)) AS total_payments,
  SUM(COALESCE(standardized_quantity,0)) AS total_quantity
FROM screened WHERE 1=1 ${isoF}
GROUP BY 1,2 ORDER BY period, iso;`,
    det: base + `
SELECT period, obs_date, iso AS zone,
  seller_company_name AS seller, customer_company_name AS buyer,
  standardized_quantity AS quantity, metric_value AS price, rate_units,
  total_transaction_charge${extraCol}, class_name, term_name, ferc_tariff_reference
FROM screened WHERE 1=1 ${isoF}
ORDER BY obs_date DESC, seller, buyer LIMIT 10000;`
  };
}

function chooseCol(metric, stat) {
  if (stat === 'average') return ['avg_value', 'Average value'];
  if (stat === 'median')  return ['median_value', 'Median value'];
  if (stat === 'total_payments') {
    if (metric === 'wind_ppa' || metric === 'solar_ppa')
      return ['avg_value', 'Average value (total_payments N/A for PPA contracts)'];
    return ['total_payments', 'Total payments ($)'];
  }
  return ['avg_value', 'Average value'];
}

// ── main query runner ──────────────────────────────────
window.runQuery = async function() {
  const btn = document.getElementById('run-btn');
  btn.disabled = true;
  try {
    let sy = +document.getElementById('sy').value;
    let sq = +document.getElementById('sq').value;
    const ey = +document.getElementById('ey').value;
    const eq = +document.getElementById('eq').value;
    const iso    = document.getElementById('iso').value;
    const metric = document.getElementById('metric').value;
    const grain  = document.querySelector('input[name="grain"]:checked').value;
    const stat   = document.getElementById('stat').value;

    const qk = (y, q) => y * 10 + q;
    if (qk(sy, sq) > qk(ey, eq)) { setStatus('Start must be before end.', 'err'); return; }

    const notes = [];
    if (qk(sy, sq) < qk(2013, 3)) {
      notes.push('Warning: PUDL dataset starts at 2013Q3 — adjusting start to 2013Q3.');
      sy = 2013; sq = 3;
      if (qk(sy, sq) > qk(ey, eq)) { setStatus('Range only covers pre-2013Q3 data — not available.', 'err'); return; }
    }

    const qs = quarterList(sy, sq, ey, eq);
    setStatus(`Querying ${qs.length} quarter(s)… may take 30–120 s depending on range and metric.`, 'loading');

    const {title, agg, det} = buildQueries(metric, iso, grain, sy, sq, ey, eq);

    const aggRes = await conn.query(agg);
    aggData = arrowToRows(aggRes);
    if (!aggData.length) { setStatus('No rows matched the filters.', 'err'); return; }

    const detRes = await conn.query(det);
    detData = arrowToRows(detRes);

    // build chart
    const [col, yLabel] = chooseCol(metric, stat);
    const groups = {};
    aggData.forEach(r => {
      if (!groups[r.iso]) groups[r.iso] = {x: [], y: []};
      groups[r.iso].x.push(r.period);
      groups[r.iso].y.push(r[col]);
    });
    const traces = Object.entries(groups).map(([name, {x, y}]) => ({
      type: 'scatter', mode: 'lines+markers', name, x, y
    }));
    Plotly.react('chart-box', traces, {
      title: {text: `${title} — by ${grain}`},
      xaxis: {title: 'Period', type: 'category'},
      yaxis: {title: yLabel},
      legend: {title: {text: 'Zone'}},
      margin: {t: 50, r: 20, l: 70, b: 60}
    }, {responsive: true});
    document.getElementById('chart-title').textContent = `${title} — by ${grain}`;
    document.getElementById('chart-card').style.display = '';

    renderTable('agg-table', aggData);
    document.getElementById('agg-card').style.display = '';

    const capped = detData.length === 10000;
    document.getElementById('det-note').textContent = capped
      ? `(showing first 10,000 rows — download CSV for full dataset)`
      : `(${detData.length.toLocaleString()} rows)`;
    renderTable('det-table', detData);
    document.getElementById('det-card').style.display = '';

    notes.push(`Agg rows: ${aggData.length} | Detail rows: ${detData.length}${capped ? ' (capped at 10k)' : ''}`);
    notes.push(`Metric: ${metric} | Grain: ${grain} | Stat: ${stat}`);
    setStatus(notes.join('\n'));

  } catch (e) {
    setStatus('Query failed: ' + e.message, 'err');
    console.error(e);
  } finally {
    btn.disabled = false;
  }
};

// ── DuckDB-WASM init ───────────────────────────────────
(async function init() {
  try {
    const BUNDLES = duckdb.getJsDelivrBundles();
    const bundle  = await duckdb.selectBundle(BUNDLES);
    const wUrl = URL.createObjectURL(
      new Blob([`importScripts("${bundle.mainWorker}");`], {type: 'text/javascript'})
    );
    const worker = new Worker(wUrl);
    const db = new duckdb.AsyncDuckDB(new duckdb.VoidLogger(), worker);
    await db.instantiate(bundle.mainModule, bundle.pthreadWorker);
    URL.revokeObjectURL(wUrl);
    conn = await db.connect();
    const btn = document.getElementById('run-btn');
    btn.textContent = 'Run Query';
    btn.disabled = false;
    setStatus('Ready — select parameters and click Run Query.');
  } catch (e) {
    setStatus('Failed to load DuckDB-WASM: ' + e.message, 'err');
    console.error(e);
  }
})();
</script>
